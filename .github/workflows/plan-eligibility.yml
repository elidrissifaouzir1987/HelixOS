name: Current plan eligibility

on:
  pull_request:
    paths:
      - ".github/workflows/contracts.yml"
      - ".github/workflows/plan-eligibility.yml"
      - "conformance/catalog.yaml"
      - "contracts/fixtures/plan-eligibility-v1/**"
      - "docs/adr/0006-current-plan-eligibility.md"
      - "kernel/Cargo.lock"
      - "kernel/Cargo.toml"
      - "kernel/rust-toolchain.toml"
      - "kernel/helix-contracts/**"
      - "kernel/helix-plan-eligibility/**"
      - "specs/002-plan-eligibility/**"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/contracts.yml"
      - ".github/workflows/plan-eligibility.yml"
      - "conformance/catalog.yaml"
      - "contracts/fixtures/plan-eligibility-v1/**"
      - "docs/adr/0006-current-plan-eligibility.md"
      - "kernel/Cargo.lock"
      - "kernel/Cargo.toml"
      - "kernel/rust-toolchain.toml"
      - "kernel/helix-contracts/**"
      - "kernel/helix-plan-eligibility/**"
      - "specs/002-plan-eligibility/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: plan-eligibility-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  conformance:
    name: PLAN-002 / ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-24.04
            expected_host: x86_64-unknown-linux-gnu
          # GitHub's official runner-images table lists macos-26 as arm64;
          # the host assertion prevents a silent architecture change.
          # https://github.com/actions/runner-images#available-images
          - platform: macos-arm64
            runner: macos-26
            expected_host: aarch64-apple-darwin
          - platform: windows-x64
            runner: windows-2022
            expected_host: x86_64-pc-windows-msvc

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pinned Rust 1.96.1
        shell: pwsh
        run: |
          rustup toolchain install 1.96.1 --profile minimal --component rustfmt,clippy --no-self-update
          rustup default 1.96.1
          rustc --version --verbose
          cargo --version

      - name: Assert runner architecture
        shell: pwsh
        run: |
          $hostLine = (rustc --version --verbose | Select-String '^host:').Line
          if (-not $hostLine) {
            throw 'rustc did not report a host triple'
          }
          $actualHost = $hostLine.Substring(5).Trim()
          $expectedHost = '${{ matrix.expected_host }}'
          if ($actualHost -ne $expectedHost) {
            throw "runner host mismatch: expected $expectedHost, got $actualHost"
          }

      - name: Check portable package formatting
        working-directory: kernel
        run: >-
          cargo fmt
          --package helix-contracts
          --package helix-plan-eligibility
          -- --check

      - name: Lint portable packages
        working-directory: kernel
        run: >-
          cargo clippy --locked
          --package helix-contracts
          --package helix-plan-eligibility
          --all-targets --all-features
          -- -D warnings

      - name: Test feature-001 contract regression
        working-directory: kernel
        run: cargo test --locked --package helix-contracts --all-targets --all-features

      - name: Test eligibility and unchanged corpus
        working-directory: kernel
        run: cargo test --locked --package helix-plan-eligibility --all-targets --all-features

      - name: Prove replay contention
        working-directory: kernel
        run: >-
          cargo test --locked --release
          --package helix-plan-eligibility
          --test contention --
          --ignored --nocapture --test-threads=1

      - name: Run deterministic eligibility soak
        working-directory: kernel
        run: >-
          cargo test --locked --release
          --package helix-plan-eligibility
          --test soak --
          --ignored --nocapture --test-threads=1

      - name: Assert corpus has not drifted
        shell: pwsh
        run: |
          $drift = git status --porcelain -- contracts/fixtures/plan-eligibility-v1
          if ($drift) {
            $drift | Write-Output
            throw 'eligibility conformance corpus changed during validation'
          }

      - name: Build immutable evidence descriptor
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ImageOS)) {
            throw 'GitHub-hosted runner did not expose ImageOS'
          }
          if ([string]::IsNullOrWhiteSpace($env:ImageVersion)) {
            throw 'GitHub-hosted runner did not expose ImageVersion'
          }

          $summary = 'contracts/fixtures/plan-eligibility-v1/expected-outcomes.json'
          $summaryHash = (Get-FileHash -LiteralPath $summary -Algorithm SHA256).Hash.ToLowerInvariant()
          $rust = (rustc --version --verbose | Out-String).Trim()
          if ($LASTEXITCODE -ne 0) {
            throw 'rustc version capture failed'
          }
          $rustSingleLine = $rust -replace '\r?\n', ';'
          $cargo = (cargo --version --verbose | Out-String).Trim()
          if ($LASTEXITCODE -ne 0) {
            throw 'cargo version capture failed'
          }
          $cargoSingleLine = $cargo -replace '\r?\n', ';'
          $osDescription = [System.Runtime.InteropServices.RuntimeInformation]::OSDescription
          $artifactName = 'plan-002-${{ matrix.platform }}-${{ github.sha }}'
          $body = @(
            'schema=helixos.plan-eligibility-ci-evidence/1'
            'acceptance_id=PLAN-002'
            'evidence_status=validated-not-yet-catalogued'
            'platform=${{ matrix.platform }}'
            'runner_label=${{ matrix.runner }}'
            "runner_image_os=$env:ImageOS"
            "runner_image_version=$env:ImageVersion"
            'runner_os=${{ runner.os }}'
            'runner_arch=${{ runner.arch }}'
            "runner_os_description=$osDescription"
            'rust_host=${{ matrix.expected_host }}'
            'commit=${{ github.sha }}'
            'workflow_ref=${{ github.workflow_ref }}'
            'event_name=${{ github.event_name }}'
            'run_id=${{ github.run_id }}'
            'run_attempt=${{ github.run_attempt }}'
            'run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            "artifact_name=$artifactName"
            'uploaded_artifact_sha256=published-after-upload'
            'artifact_attestation=push-or-workflow-dispatch-only'
            "expected_outcomes_sha256=$summaryHash"
            "rust=$rustSingleLine"
            "cargo=$cargoSingleLine"
          ) -join "`n"
          Set-Content -LiteralPath 'plan-002-evidence.txt' -Value $body -Encoding utf8 -NoNewline

      - name: Upload evidence descriptor
        id: upload-evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plan-002-${{ matrix.platform }}-${{ github.sha }}
          path: plan-002-evidence.txt
          if-no-files-found: error
          retention-days: 90

      - name: Attest uploaded evidence artifact provenance
        id: attest-evidence
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: plan-002-${{ matrix.platform }}-${{ github.sha }}
          subject-digest: sha256:${{ steps.upload-evidence.outputs.artifact-digest }}

      - name: Validate and publish evidence artifact digest
        if: always() && steps.upload-evidence.outcome == 'success'
        shell: pwsh
        env:
          EVIDENCE_ARTIFACT_ID: ${{ steps.upload-evidence.outputs.artifact-id }}
          EVIDENCE_ARTIFACT_URL: ${{ steps.upload-evidence.outputs.artifact-url }}
          EVIDENCE_ARTIFACT_DIGEST: ${{ steps.upload-evidence.outputs.artifact-digest }}
          EVIDENCE_ATTESTATION_ID: ${{ steps.attest-evidence.outputs.attestation-id }}
          EVIDENCE_ATTESTATION_URL: ${{ steps.attest-evidence.outputs.attestation-url }}
          EVIDENCE_ATTESTATION_OUTCOME: ${{ steps.attest-evidence.outcome }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:EVIDENCE_ARTIFACT_ID)) {
            throw 'upload-artifact did not return an artifact ID'
          }
          if ([string]::IsNullOrWhiteSpace($env:EVIDENCE_ARTIFACT_URL)) {
            throw 'upload-artifact did not return an artifact URL'
          }
          if ($env:EVIDENCE_ARTIFACT_DIGEST -notmatch '^[0-9a-fA-F]{64}$') {
            throw 'upload-artifact did not return a SHA-256 artifact digest'
          }

          $artifactDigest = $env:EVIDENCE_ARTIFACT_DIGEST.ToLowerInvariant()
          if ('${{ github.event_name }}' -eq 'pull_request') {
            $evidenceStatus = 'validation-only-no-attestation'
            $attestationStatus = 'not-produced-pr-validation-only'
            $attestationId = 'not-applicable'
            $attestationUrl = 'not-applicable'
          }
          else {
            if ($env:EVIDENCE_ATTESTATION_OUTCOME -ne 'success' `
                -or [string]::IsNullOrWhiteSpace($env:EVIDENCE_ATTESTATION_ID) `
                -or [string]::IsNullOrWhiteSpace($env:EVIDENCE_ATTESTATION_URL)) {
              throw 'immutable evidence run did not publish its required attestation'
            }
            $evidenceStatus = 'immutable-evidence-uncatalogued'
            $attestationStatus = 'published'
            $attestationId = $env:EVIDENCE_ATTESTATION_ID
            $attestationUrl = $env:EVIDENCE_ATTESTATION_URL
          }
          $summary = @(
            'PLAN-002 evidence artifact'
            "evidence_status=$evidenceStatus"
            'platform=${{ matrix.platform }}'
            'runner_label=${{ matrix.runner }}'
            'runner_os=${{ runner.os }}'
            'runner_arch=${{ runner.arch }}'
            'rust_host=${{ matrix.expected_host }}'
            'commit=${{ github.sha }}'
            'event_name=${{ github.event_name }}'
            'run_id=${{ github.run_id }}'
            "artifact_id=$($env:EVIDENCE_ARTIFACT_ID)"
            "artifact_url=$($env:EVIDENCE_ARTIFACT_URL)"
            "uploaded_artifact_sha256=$artifactDigest"
            "attestation_status=$attestationStatus"
            "attestation_id=$attestationId"
            "attestation_url=$attestationUrl"
            'catalog_claim_status=pending-until-conformance-catalog-is-updated'
          ) -join "`n"
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value $summary -Encoding utf8
