        requirement: Every automated required platform reproduces byte-identical protected JCS, plan identifier, signature, and complete envelope from the unchanged corpus.
      - id: mutation-coverage
        requirement: Mutating every protected effect-bearing or authority-bearing leaf changes the plan identifier and invalidates the original signature.
      - id: deny-corpus
        requirement: Ordering, Unicode, numeric bounds, resource validation, duplicate or unknown fields, version or algorithm denial, tampering, wrong or untrusted key, and malformed signature cases produce their declared typed results before simulated dispatch.
      - id: robustness
        requirement: Property tests complete without panic or platform drift and the deterministic ignored soak validates at least 100000 generated envelopes.
      - id: immutable-ci
        requirement: A successful unchanged matrix run is linked by immutable commit and run URL before PLAN-001 or cross-platform readiness is claimed.
