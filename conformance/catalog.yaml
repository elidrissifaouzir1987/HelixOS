      expected_outcomes: contracts/fixtures/plan-eligibility-v1/expected-outcomes.json
      instructions: contracts/fixtures/plan-eligibility-v1/README.md
      summary_schema: helixos.plan-eligibility-summary/1
    ci_workflow: .github/workflows/plan-eligibility.yml
    toolchain:
      manifest: kernel/rust-toolchain.toml
      rust: 1.96.1
      profile: minimal
      components:
        - rustfmt
        - clippy
      cargo_lock: kernel/Cargo.lock
    required_platforms:
      - id: linux-x86_64
        runner: ubuntu-24.04
        rust_host: x86_64-unknown-linux-gnu
        automation: required
      - id: macos-arm64
        runner: macos-26
        rust_host: aarch64-apple-darwin
        automation: required
      - id: windows-x64
        runner: windows-2022
        rust_host: x86_64-pc-windows-msvc
        automation: required
    evidence_requirements:
      - id: context-build-errors
        requirement: Every frozen CONTEXT_BUILD_* case produces context_build_denied before evaluator or claimant construction, with the declared redacted code.
      - id: single-fault-and-order
        requirement: The coherent case reaches one final claim; every declared single-fault runtime case returns its exact first denial in normative order, and every pre-claim denial records zero claimant calls.
      - id: signer-fingerprint-and-rotation
        requirement: The exact verified Ed25519 public-key fingerprint, immutable key identifier, current trust fingerprint, trust generation, and minimum accepted issuance time are checked; key rotation or identifier reuse cannot revive a held plan or reopen its nonce.
      - id: replay-receipt-binding
        requirement: Replay uniqueness uses the stable plan-v1 issuer namespace and (instance_epoch, nonce), both uniqueness indexes change atomically, and a claimant receipt with any other domain-separated binding digest denies.
      - id: replay-contention
        requirement: At least 1000 barrier-synchronised release-mode rounds produce exactly one new eligible marker per replay authority domain, with all other contenders denied and no release, reset, retry, or idempotent second success.
      - id: robustness-soak
        requirement: The deterministic generated-context soak evaluates at least 100000 cases with the same seed and oracle without panic, overflow, false acceptance, or platform-summary drift.
      - id: benchmark
        requirement: A release benchmark evaluates at least 10000 complete local test-claimant iterations, proves p95 at or below 1 ms, and records exact hardware, OS and architecture, Rust toolchain, build profile, workload, concurrency, corpus digest, sample count, raw sorted samples, and p50/p95/p99/max.
      - id: redaction
        requirement: Context-build, denial, failure, marker, claims, replay, Display, Debug, and error-source sentinel tests expose no identifier, nonce, digest, signature, resource, protected content, expected or actual value, native path, or raw provider error.
      - id: removal
        requirement: The documented non-destructive removal drill proves no reverse dependency from feature-001 or the legacy runtime and preserves feature-001 canonical bytes, plan identifiers, signatures, fixtures, and MVP-0 behavior.
      - id: immutable-ci
        requirement: One unchanged Linux x86_64, macOS arm64, and Windows x64 matrix for the same commit publishes exact runner and rustc host, expected-outcomes digest, retained artifacts and attestations before PLAN-002, portability, Mac mini M4, or Tier 1 readiness is claimed.
    claim_status: pending-evidence
    evidence:
