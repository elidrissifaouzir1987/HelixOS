name: Durable preparation before dispatch

on:
  pull_request:
    paths:
      - ".gitattributes"
      - ".github/workflows/durable-preparation.yml"
      - "conformance/catalog.yaml"
      - "contracts/fixtures/durable-preparation-v1/**"
      - "kernel/Cargo.lock"
      - "kernel/Cargo.toml"
      - "kernel/rust-toolchain.toml"
      - "kernel/helix-contracts/**"
      - "kernel/helix-plan-eligibility/**"
      - "kernel/helix-plan-preparation/**"
      - "kernel/helix-replay-sqlite/**"
      - "kernel/helix-coordinator-sqlite/**"
      - "specs/004-durable-preparation/**"
  push:
    branches:
      - master
    paths:
      - ".gitattributes"
      - ".github/workflows/durable-preparation.yml"
      - "conformance/catalog.yaml"
      - "contracts/fixtures/durable-preparation-v1/**"
      - "kernel/Cargo.lock"
      - "kernel/Cargo.toml"
      - "kernel/rust-toolchain.toml"
      - "kernel/helix-contracts/**"
      - "kernel/helix-plan-eligibility/**"
      - "kernel/helix-plan-preparation/**"
      - "kernel/helix-replay-sqlite/**"
      - "kernel/helix-coordinator-sqlite/**"
      - "specs/004-durable-preparation/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: durable-preparation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  path-policy:
    name: PLAN-004 / path and LF policy
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify digest-sensitive path policy
        shell: pwsh
        run: |
          $required = @(
            '/kernel/Cargo.lock text eol=lf',
            '/contracts/fixtures/durable-preparation-v1/* text eol=lf',
            '/specs/004-durable-preparation/contracts/*.json text eol=lf',
            '/specs/004-durable-preparation/contracts/*.sql text eol=lf',
            '/specs/004-durable-preparation/evidence/* text eol=lf whitespace=-blank-at-eof',
            '/.github/workflows/durable-preparation.yml text eol=lf'
          )
          $attributes = Get-Content -Raw -LiteralPath '.gitattributes'
          foreach ($line in $required) {
            if (-not $attributes.Contains($line)) {
              throw "missing PLAN-004 .gitattributes rule: $line"
            }
          }
          git diff --check
          if ($LASTEXITCODE -ne 0) {
            throw 'git diff --check failed'
          }

  conformance:
    name: PLAN-004 / ${{ matrix.platform }}
    needs: path-policy
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-24.04
            expected_host: x86_64-unknown-linux-gnu
          - platform: macos-arm64
            runner: macos-26
            expected_host: aarch64-apple-darwin
          - platform: windows-x64
            runner: windows-2022
            expected_host: x86_64-pc-windows-msvc

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pinned Rust 1.96.1
        shell: pwsh
        run: |
          rustup toolchain install 1.96.1 --profile minimal --component rustfmt,clippy --no-self-update
          rustup default 1.96.1
          $hostLine = (rustc --version --verbose | Select-String '^host:').Line
          if (-not $hostLine) {
            throw 'rustc did not report a host triple'
          }
          $actualHost = $hostLine.Substring(5).Trim()
          if ($actualHost -ne '${{ matrix.expected_host }}') {
            throw "runner host mismatch: expected ${{ matrix.expected_host }}, got $actualHost"
          }
          rustc --version --verbose
          cargo --version --verbose

      - name: Check format and locked production surface
        working-directory: kernel
        run: >-
          cargo fmt
          --package helix-contracts
          --package helix-plan-eligibility
          --package helix-replay-sqlite
          --package helix-plan-preparation
          --package helix-coordinator-sqlite
          -- --check

      - name: Lint all coordinator and fault targets
        working-directory: kernel
        run: >-
          cargo clippy --locked
          --package helix-coordinator-sqlite
          --all-targets
          --all-features
          -- -D warnings

      - name: Test prerequisite contract chain
        working-directory: kernel
        run: >-
          cargo test --locked
          --package helix-contracts
          --package helix-plan-eligibility
          --package helix-replay-sqlite
          --package helix-plan-preparation

      - name: Test hosted coordinator surfaces outside the controlled timing oracle
        working-directory: kernel
        run: >-
          cargo test --locked
          --package helix-coordinator-sqlite
          --all-targets
          --all-features
          -- --test-threads=1
          --skip held_writer_returns_by_absolute_injected_deadline_and_never_mutates_later

      - name: Verify frozen corpus and stable runner summary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path 'plan-004-evidence' | Out-Null
          cargo run --locked --manifest-path kernel/Cargo.toml `
            --package helix-coordinator-sqlite `
            --example durable_preparation_corpus 2>&1 | Tee-Object `
            -FilePath 'plan-004-evidence/corpus-runner.txt'
          if ($LASTEXITCODE -ne 0) {
            throw 'portable corpus runner failed'
          }
          cargo test --locked --manifest-path kernel/Cargo.toml `
            --package helix-coordinator-sqlite `
            --features test-fault-injection `
            --test conformance_execution -- --test-threads=1 --nocapture 2>&1 | `
            Tee-Object -FilePath 'plan-004-evidence/fault-registry.txt'
          if ($LASTEXITCODE -ne 0) {
            throw 'fault registry conformance failed'
          }

      - name: Verify provenance and production backup/restore paths
        shell: pwsh
        run: |
          cargo test --locked --manifest-path kernel/Cargo.toml `
            --package helix-coordinator-sqlite `
            --test backup_restore -- --nocapture 2>&1 | Tee-Object `
            -FilePath 'plan-004-evidence/backup-restore.txt'
          if ($LASTEXITCODE -ne 0) {
            throw 'backup/restore provenance tests failed'
          }
          cargo test --locked --manifest-path kernel/Cargo.toml `
            --package helix-coordinator-sqlite `
            --features test-fault-injection `
            --test production_backup_conformance -- --nocapture
          if ($LASTEXITCODE -ne 0) {
            throw 'production backup conformance failed'
          }
          cargo test --locked --manifest-path kernel/Cargo.toml `
            --package helix-coordinator-sqlite `
            --features test-fault-injection `
            --test production_restore_conformance -- --nocapture
          if ($LASTEXITCODE -ne 0) {
            throw 'production restore conformance/refusal profile failed'
          }

      - name: Prove controlled release contention
        working-directory: kernel
        run: >-
          cargo test --locked --release
          --package helix-coordinator-sqlite
          --test contention --
          --ignored --nocapture --test-threads=1

      - name: Prove explicit process-kill recovery
        shell: pwsh
        run: |
          cargo test --locked --release --manifest-path kernel/Cargo.toml `
            --package helix-coordinator-sqlite `
            --features test-fault-injection `
            --test process_crash -- --ignored --nocapture --test-threads=1 2>&1 | `
            Tee-Object -FilePath 'plan-004-evidence/process-kill.txt'
          if ($LASTEXITCODE -ne 0) {
            throw 'process-kill matrix failed'
          }

      - name: Capture dependency, toolchain and reviewed artifact digests
        shell: pwsh
        run: |
          cargo tree --locked --manifest-path kernel/Cargo.toml `
            --package helix-coordinator-sqlite --edges normal --target all | Set-Content `
            -LiteralPath 'plan-004-evidence/cargo-tree.txt' -Encoding utf8
          if ($LASTEXITCODE -ne 0) {
            throw 'cargo tree failed'
          }
          rustc --version --verbose | Set-Content `
            -LiteralPath 'plan-004-evidence/rustc-version.txt' -Encoding utf8
          $files = @(
            'contracts/fixtures/durable-preparation-v1/cases.json',
            'contracts/fixtures/durable-preparation-v1/expected-outcomes.json',
            'specs/004-durable-preparation/contracts/preparation-store-schema-v1.sql',
            'specs/004-durable-preparation/contracts/preparation-backup-manifest-v1.schema.json',
            'specs/004-durable-preparation/contracts/preparation-backup-provenance-attestation-v1.schema.json',
            'specs/004-durable-preparation/contracts/recovery-snapshot-manifest-v1.schema.json',
            'specs/004-durable-preparation/contracts/recovery-root-metadata-v1.schema.json',
            'kernel/Cargo.lock'
          )
          $digests = foreach ($file in $files) {
            [ordered]@{
              path = $file
              sha256 = (Get-FileHash -LiteralPath $file -Algorithm SHA256).Hash.ToLowerInvariant()
            }
          }
          $descriptor = [ordered]@{
            schema = 'helixos.durable-preparation-ci-evidence/1'
            acceptance_id = 'PLAN-004'
            evidence_kind = 'synthetic-conformance-and-process-kill-not-power-loss'
            claim_status = 'pending-until-catalogued'
            platform = '${{ matrix.platform }}'
            runner = '${{ matrix.runner }}'
            rust_host = '${{ matrix.expected_host }}'
            commit = '${{ github.sha }}'
            workflow_ref = '${{ github.workflow_ref }}'
            run_id = '${{ github.run_id }}'
            run_attempt = '${{ github.run_attempt }}'
            artifact_name = 'plan-004-${{ matrix.platform }}-${{ github.sha }}'
            test_scope = [ordered]@{
              coordinator = 'all-targets-all-features'
              test_threads = 1
              excluded_runtime_oracle = 'held_writer_returns_by_absolute_injected_deadline_and_never_mutates_later'
              exclusion_owner = 'PLAN-004-T043-SC-010-controlled-target'
              physical_performance_evidence = $false
            }
            reviewed_artifacts = $digests
          }
          $descriptor | ConvertTo-Json -Depth 5 -Compress | Set-Content `
            -LiteralPath 'plan-004-evidence/descriptor.json' -Encoding utf8 -NoNewline

      - name: Assert validation did not rewrite reviewed bytes
        shell: pwsh
        run: |
          $drift = git status --porcelain -- `
            .gitattributes `
            contracts/fixtures/durable-preparation-v1 `
            specs/004-durable-preparation/contracts `
            kernel/Cargo.lock
          if ($drift) {
            $drift | Write-Output
            throw 'reviewed PLAN-004 bytes changed during validation'
          }

      - name: Upload retained evidence
        id: upload-evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plan-004-${{ matrix.platform }}-${{ github.sha }}
          path: plan-004-evidence
          if-no-files-found: error
          retention-days: 90

      - name: Attest uploaded evidence artifact
        id: attest-evidence
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: plan-004-${{ matrix.platform }}-${{ github.sha }}
          subject-digest: sha256:${{ steps.upload-evidence.outputs.artifact-digest }}

      - name: Publish artifact digest and pending-claim status
        if: always() && steps.upload-evidence.outcome == 'success'
        shell: pwsh
        env:
          ARTIFACT_ID: ${{ steps.upload-evidence.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload-evidence.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload-evidence.outputs.artifact-digest }}
          ATTESTATION_URL: ${{ steps.attest-evidence.outputs.attestation-url }}
        run: |
          if ($env:ARTIFACT_DIGEST -notmatch '^[0-9a-fA-F]{64}$') {
            throw 'upload-artifact did not return a SHA-256 digest'
          }
          $summary = @(
            'PLAN-004 validation artifact',
            'claim_status=pending-until-conformance-catalog-is-updated',
            'platform=${{ matrix.platform }}',
            'commit=${{ github.sha }}',
            'coordinator_test_scope=all-targets-all-features',
            'coordinator_test_threads=1',
            'excluded_runtime_oracle=held_writer_returns_by_absolute_injected_deadline_and_never_mutates_later',
            'exclusion_owner=PLAN-004-T043-SC-010-controlled-target',
            'physical_performance_evidence=false',
            "artifact_id=$($env:ARTIFACT_ID)",
            "artifact_url=$($env:ARTIFACT_URL)",
            "uploaded_artifact_sha256=$($env:ARTIFACT_DIGEST.ToLowerInvariant())",
            "attestation_url=$($env:ATTESTATION_URL)"
          ) -join "`n"
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value $summary -Encoding utf8
