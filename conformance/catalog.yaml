  - acceptance_id: PLAN-001
    title: Portable canonical and signed plan identity
    feature: specs/001-portable-signed-contracts/spec.md
    adr: docs/adr/0005-canonical-signed-contracts.md
    contract:
      schema_id: helixos.plan-envelope/1
      media_type: application/vnd.helixos.plan-envelope+json;version=1
      json_schema: contracts/schemas/plan-envelope-v1.schema.json
      negative_manifest_schema: contracts/schemas/negative-contract-corpus-v1.schema.json
      fixture_root: contracts/fixtures/plan-envelope-v1
      negative_manifest: contracts/fixtures/plan-envelope-v1/negative-cases.json
      fixture_instructions: contracts/fixtures/plan-envelope-v1/README.md
    ci_workflow: .github/workflows/contracts.yml
    required_platforms:
      - id: linux-x86_64
        runner: ubuntu-24.04
        rust_host: x86_64-unknown-linux-gnu
        automation: required
      - id: linux-arm64
        runner: not-configured
        rust_host: aarch64-unknown-linux-gnu
        automation: pending-runner
      - id: macos-arm64
        runner: macos-26
        rust_host: aarch64-apple-darwin
        automation: required
      - id: windows-x64
        runner: windows-2022
        rust_host: x86_64-pc-windows-msvc
        automation: required
    evidence_requirements:
      - id: schema-and-wire
        requirement: The reviewed positive envelope satisfies the Draft 2020-12 schema and the strict decoder accepts only its exact canonical wire bytes.
      - id: golden-portability
        requirement: Every automated required platform reproduces byte-identical protected JCS, plan identifier, signature, and complete envelope from the unchanged corpus.
      - id: mutation-coverage
        requirement: Mutating every protected effect-bearing or authority-bearing leaf changes the plan identifier and invalidates the original signature.
      - id: deny-corpus
        requirement: Ordering, Unicode, numeric bounds, resource validation, duplicate or unknown fields, version or algorithm denial, tampering, wrong or untrusted key, and malformed signature cases produce their declared typed results before simulated dispatch.
      - id: robustness
        requirement: Property tests complete without panic or platform drift and the deterministic ignored soak validates at least 100000 generated envelopes.
      - id: immutable-ci
        requirement: A successful unchanged matrix run is linked by immutable commit and run URL before PLAN-001 or cross-platform readiness is claimed.
    claim_status: pending-evidence
    evidence:
      local_windows_benchmark: specs/001-portable-signed-contracts/evidence/benchmark-windows-x86_64-2026-07-10.json
      immutable_commit: pending
      immutable_ci_run: pending
      linux_arm64_run: pending
