name: Portable signed contracts

on:
  pull_request:
    paths:
      - ".gitattributes"
      - ".github/workflows/contracts.yml"
      - "contracts/**"
      - "conformance/**"
      - "docs/adr/0005-canonical-signed-contracts.md"
      - "kernel/Cargo.lock"
      - "kernel/Cargo.toml"
      - "kernel/helix-contracts/**"
      - "kernel/helixos-provision/**"
      - "specs/001-portable-signed-contracts/**"
  push:
    branches:
      - master
    paths:
      - ".gitattributes"
      - ".github/workflows/contracts.yml"
      - "contracts/**"
      - "conformance/**"
      - "docs/adr/0005-canonical-signed-contracts.md"
      - "kernel/Cargo.lock"
      - "kernel/Cargo.toml"
      - "kernel/helix-contracts/**"
      - "kernel/helixos-provision/**"
      - "specs/001-portable-signed-contracts/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  conformance:
    name: PLAN-001 / ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-24.04
            expected_host: x86_64-unknown-linux-gnu
          # Verified 2026-07-10 against GitHub's official runner-images table:
          # https://github.com/actions/runner-images#available-images
          # macos-26 is arm64; the host assertion prevents a silent arch drift.
          - platform: macos-arm64
            runner: macos-26
            expected_host: aarch64-apple-darwin
          - platform: windows-x64
            runner: windows-2022
            expected_host: x86_64-pc-windows-msvc

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Python for contract validation
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install exact-pinned JSON Schema validator
        shell: pwsh
        run: >-
          python -m pip install
          --disable-pip-version-check
          --no-input
          check-jsonschema==0.37.4

      - name: Install pinned Rust 1.96.1 with formatting and lint components
        shell: pwsh
        run: |
          rustup toolchain install 1.96.1 --profile minimal --component rustfmt,clippy --no-self-update
          rustup default 1.96.1
          rustc --version --verbose
          cargo --version

      - name: Assert runner architecture
        shell: pwsh
        run: |
          $hostLine = (rustc --version --verbose | Select-String '^host:').Line
          if (-not $hostLine) {
            throw 'rustc did not report a host triple'
          }
          $actualHost = $hostLine.Substring(5).Trim()
          $expectedHost = '${{ matrix.expected_host }}'
          if ($actualHost -ne $expectedHost) {
            throw "runner host mismatch: expected $expectedHost, got $actualHost"
          }

      - name: Select the OpenSSL 3 strict-verification oracle
        shell: pwsh
        run: |
          if ($IsMacOS) {
            $prefix = (& brew --prefix openssl@3).Trim()
            if ($LASTEXITCODE -ne 0 -or -not $prefix) {
              throw 'Homebrew openssl@3 is unavailable on the macOS runner'
            }
            $openssl = Join-Path $prefix 'bin/openssl'
          } else {
            $openssl = (Get-Command openssl -CommandType Application -ErrorAction Stop |
              Select-Object -First 1).Source
          }

          $version = (& $openssl version 2>&1 | Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or $version -notmatch '^OpenSSL 3\.') {
            throw "expected an OpenSSL 3.x verifier at $openssl, got: $version"
          }
          "OPENSSL=$openssl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "Strict verification oracle: $version"

      - name: Validate Draft 2020-12 contract artifacts
        shell: pwsh
        run: |
          $schemaPath = 'contracts/schemas/plan-envelope-v1.schema.json'
          $negativeSchemaPath = 'contracts/schemas/negative-contract-corpus-v1.schema.json'
          $goldenEnvelope = 'contracts/fixtures/plan-envelope-v1/valid-plan.envelope.jcs'
          $negativeManifest = 'contracts/fixtures/plan-envelope-v1/negative-cases.json'
          $expectedDialect = 'https://json-schema.org/draft/2020-12/schema'

          foreach ($candidate in @($schemaPath, $negativeSchemaPath)) {
            $schemaDocument = Get-Content -Raw -LiteralPath $candidate | ConvertFrom-Json
            if ($schemaDocument.'$schema' -ne $expectedDialect) {
              throw "$candidate must declare $expectedDialect"
            }
            python -m check_jsonschema --check-metaschema $candidate
            if ($LASTEXITCODE -ne 0) {
              throw "$candidate is not valid Draft 2020-12 JSON Schema"
            }
          }

          python -m check_jsonschema --schemafile $schemaPath --force-filetype json $goldenEnvelope
          if ($LASTEXITCODE -ne 0) {
            throw 'golden plan envelope does not satisfy the contract schema'
          }

          python -m check_jsonschema --schemafile $negativeSchemaPath $negativeManifest
          if ($LASTEXITCODE -ne 0) {
            throw 'negative contract corpus manifest does not satisfy its schema'
          }

      - name: Check contract formatting
        working-directory: kernel
        run: cargo fmt --package helix-contracts -- --check

      - name: Lint workspace
        working-directory: kernel
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Test contract crate
        working-directory: kernel
        run: cargo test --locked -p helix-contracts --all-targets --all-features

      - name: Test workspace
        working-directory: kernel
        run: cargo test --locked --workspace --all-targets --all-features

      - name: Reproduce exact fixture corpus
        shell: pwsh
        working-directory: kernel
        run: |
          cargo run --locked -p helix-contracts --example plan_benchmark -- --write-fixtures ../contracts/fixtures/plan-envelope-v1
          $drift = git status --porcelain -- ../contracts/fixtures/plan-envelope-v1
          if ($drift) {
            $drift | Write-Output
            throw 'fixture generator output differs from the committed corpus'
          }

      - name: Build immutable PLAN-001 evidence descriptor
        shell: pwsh
        run: |
          $schemaPath = 'contracts/schemas/plan-envelope-v1.schema.json'
          $negativeSchemaPath = 'contracts/schemas/negative-contract-corpus-v1.schema.json'
          $fixtureRoot = 'contracts/fixtures/plan-envelope-v1'
          $resolvedFixtureRoot = (Resolve-Path -LiteralPath $fixtureRoot).Path

          $fixtureMembers = @(
            Get-ChildItem -LiteralPath $fixtureRoot -File -Recurse |
              ForEach-Object {
                $relativePath = [System.IO.Path]::GetRelativePath(
                  $resolvedFixtureRoot,
                  $_.FullName
                ).Replace('\', '/')
                [pscustomobject][ordered]@{
                  path = $relativePath
                  sha256 = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
                }
              } |
              Sort-Object -Property path
          )
          if ($fixtureMembers.Count -eq 0) {
            throw 'PLAN-001 fixture corpus is empty'
          }

          $corpusDigestInput = ($fixtureMembers | ForEach-Object {
            "$($_.sha256)  $($_.path)"
          }) -join "`n"
          $corpusDigestBytes = [System.Text.Encoding]::UTF8.GetBytes($corpusDigestInput)
          $sha256 = [System.Security.Cryptography.SHA256]::Create()
          try {
            $corpusDigest = [System.BitConverter]::ToString(
              $sha256.ComputeHash($corpusDigestBytes)
            ).Replace('-', '').ToLowerInvariant()
          }
          finally {
            $sha256.Dispose()
          }

          $schemaDigest = (Get-FileHash -LiteralPath $schemaPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $negativeSchemaDigest = (Get-FileHash -LiteralPath $negativeSchemaPath -Algorithm SHA256).Hash.ToLowerInvariant()
          foreach ($digest in @($schemaDigest, $negativeSchemaDigest, $corpusDigest)) {
            if ($digest -notmatch '^[0-9a-f]{64}$') {
              throw 'reviewed PLAN-001 artifact did not produce a lowercase SHA-256 digest'
            }
          }

          $rustcVerbose = (rustc --version --verbose | Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($rustcVerbose)) {
            throw 'rustc version capture failed'
          }
          $rustHostLine = ($rustcVerbose -split '\r?\n' | Where-Object { $_ -match '^host:' } | Select-Object -First 1)
          if (-not $rustHostLine) {
            throw 'rustc evidence did not contain a host triple'
          }
          $rustHost = $rustHostLine.Substring(5).Trim()
          if ($rustHost -ne '${{ matrix.expected_host }}') {
            throw "evidence host mismatch: expected ${{ matrix.expected_host }}, got $rustHost"
          }

          $cargoVersion = (cargo --version | Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($cargoVersion)) {
            throw 'cargo version capture failed'
          }
          $pythonVersion = (python --version 2>&1 | Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($pythonVersion)) {
            throw 'Python version capture failed'
          }
          $checkJsonschemaVersion = (
            python -c "import importlib.metadata; print(importlib.metadata.version('check-jsonschema'))" 2>&1 |
              Out-String
          ).Trim()
          if ($LASTEXITCODE -ne 0 -or $checkJsonschemaVersion -ne '0.37.4') {
            throw "check-jsonschema version drifted: $checkJsonschemaVersion"
          }
          if ([string]::IsNullOrWhiteSpace($env:OPENSSL)) {
            throw 'OpenSSL verifier path was not preserved for evidence capture'
          }
          $opensslVersion = (& $env:OPENSSL version 2>&1 | Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or $opensslVersion -notmatch '^OpenSSL 3\.') {
            throw "OpenSSL evidence capture failed: $opensslVersion"
          }

          $runnerImageOs = $env:ImageOS
          $runnerImageVersion = $env:ImageVersion
          $runnerOs = '${{ runner.os }}'
          $runnerArch = '${{ runner.arch }}'
          $runnerOsDescription = [System.Runtime.InteropServices.RuntimeInformation]::OSDescription
          foreach ($value in @(
            $runnerImageOs,
            $runnerImageVersion,
            $runnerOs,
            $runnerArch,
            $runnerOsDescription
          )) {
            if ([string]::IsNullOrWhiteSpace($value)) {
              throw 'GitHub hosted-runner evidence metadata is incomplete'
            }
          }

          $eventName = '${{ github.event_name }}'
          if ($eventName -eq 'pull_request') {
            $evidenceStatus = 'validation-only-no-attestation'
          }
          elseif ($eventName -eq 'push' -or $eventName -eq 'workflow_dispatch') {
            $evidenceStatus = 'immutable-evidence-uncatalogued'
          }
          else {
            throw "unsupported evidence event: $eventName"
          }

          $artifactName = 'plan-001-${{ matrix.platform }}-${{ github.sha }}'
          $descriptor = [ordered]@{
            schema = 'helixos.portable-signed-contracts-ci-evidence/1'
            acceptance_id = 'PLAN-001'
            evidence_status = $evidenceStatus
            platform = '${{ matrix.platform }}'
            runner = [ordered]@{
              label = '${{ matrix.runner }}'
              image_os = $runnerImageOs
              image_version = $runnerImageVersion
              os = $runnerOs
              arch = $runnerArch
              os_description = $runnerOsDescription
            }
            source = [ordered]@{
              commit = '${{ github.sha }}'
              workflow_ref = '${{ github.workflow_ref }}'
              event_name = $eventName
              run_id = '${{ github.run_id }}'
              run_attempt = '${{ github.run_attempt }}'
              run_url = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            }
            toolchain = [ordered]@{
              rust_host = $rustHost
              rustc_verbose = $rustcVerbose
              cargo = $cargoVersion
              python = $pythonVersion
              check_jsonschema = $checkJsonschemaVersion
              openssl_version = $opensslVersion
            }
            reviewed_artifacts = [ordered]@{
              plan_envelope_schema_sha256 = $schemaDigest
              negative_corpus_schema_sha256 = $negativeSchemaDigest
              fixture_corpus_manifest_sha256 = $corpusDigest
              fixture_members = $fixtureMembers
            }
            artifact = [ordered]@{
              name = $artifactName
              uploaded_artifact_sha256 = 'published-after-upload'
              attestation = 'push-or-workflow-dispatch-only'
              retention_days = 90
            }
          }
          New-Item -ItemType Directory -Path 'plan-001-evidence' | Out-Null
          $descriptor | ConvertTo-Json -Depth 8 -Compress | Set-Content `
            -LiteralPath 'plan-001-evidence/descriptor.json' -Encoding utf8 -NoNewline

      - name: Upload retained PLAN-001 evidence
        id: upload-evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plan-001-${{ matrix.platform }}-${{ github.sha }}
          path: plan-001-evidence
          if-no-files-found: error
          retention-days: 90

      - name: Attest uploaded PLAN-001 evidence provenance
        id: attest-evidence
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: plan-001-${{ matrix.platform }}-${{ github.sha }}
          subject-digest: sha256:${{ steps.upload-evidence.outputs.artifact-digest }}

      - name: Validate and publish PLAN-001 evidence outputs
        if: always() && steps.upload-evidence.outcome == 'success'
        shell: pwsh
        env:
          EVIDENCE_ARTIFACT_ID: ${{ steps.upload-evidence.outputs.artifact-id }}
          EVIDENCE_ARTIFACT_URL: ${{ steps.upload-evidence.outputs.artifact-url }}
          EVIDENCE_ARTIFACT_DIGEST: ${{ steps.upload-evidence.outputs.artifact-digest }}
          EVIDENCE_ATTESTATION_ID: ${{ steps.attest-evidence.outputs.attestation-id }}
          EVIDENCE_ATTESTATION_URL: ${{ steps.attest-evidence.outputs.attestation-url }}
          EVIDENCE_ATTESTATION_OUTCOME: ${{ steps.attest-evidence.outcome }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:EVIDENCE_ARTIFACT_ID)) {
            throw 'upload-artifact did not return an artifact ID'
          }
          if ([string]::IsNullOrWhiteSpace($env:EVIDENCE_ARTIFACT_URL)) {
            throw 'upload-artifact did not return an artifact URL'
          }
          if ($env:EVIDENCE_ARTIFACT_DIGEST -notmatch '^[0-9a-fA-F]{64}$') {
            throw 'upload-artifact did not return a SHA-256 artifact digest'
          }

          $eventName = '${{ github.event_name }}'
          $artifactDigest = $env:EVIDENCE_ARTIFACT_DIGEST.ToLowerInvariant()
          if ($eventName -eq 'pull_request') {
            if ($env:EVIDENCE_ATTESTATION_OUTCOME -ne 'skipped' `
                -or -not [string]::IsNullOrWhiteSpace($env:EVIDENCE_ATTESTATION_ID) `
                -or -not [string]::IsNullOrWhiteSpace($env:EVIDENCE_ATTESTATION_URL)) {
              throw 'pull-request validation unexpectedly produced an attestation'
            }
            $evidenceStatus = 'validation-only-no-attestation'
            $attestationStatus = 'not-produced-pr-validation-only'
            $attestationId = 'not-applicable'
            $attestationUrl = 'not-applicable'
          }
          elseif ($eventName -eq 'push' -or $eventName -eq 'workflow_dispatch') {
            if ($env:EVIDENCE_ATTESTATION_OUTCOME -ne 'success' `
                -or [string]::IsNullOrWhiteSpace($env:EVIDENCE_ATTESTATION_ID) `
                -or [string]::IsNullOrWhiteSpace($env:EVIDENCE_ATTESTATION_URL)) {
              throw 'immutable evidence run did not publish its required attestation'
            }
            $evidenceStatus = 'immutable-evidence-uncatalogued'
            $attestationStatus = 'published'
            $attestationId = $env:EVIDENCE_ATTESTATION_ID
            $attestationUrl = $env:EVIDENCE_ATTESTATION_URL
          }
          else {
            throw "unsupported evidence event: $eventName"
          }

          $summary = @(
            'PLAN-001 portable signed contracts validation artifact'
            "evidence_status=$evidenceStatus"
            'platform=${{ matrix.platform }}'
            'runner_label=${{ matrix.runner }}'
            'rust_host=${{ matrix.expected_host }}'
            'commit=${{ github.sha }}'
            "event_name=$eventName"
            'run_id=${{ github.run_id }}'
            'run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            "artifact_id=$($env:EVIDENCE_ARTIFACT_ID)"
            "artifact_url=$($env:EVIDENCE_ARTIFACT_URL)"
            "uploaded_artifact_sha256=$artifactDigest"
            "attestation_status=$attestationStatus"
            "attestation_id=$attestationId"
            "attestation_url=$attestationUrl"
            'catalog_claim_status=pending-until-conformance-catalog-is-updated'
          ) -join "`n"
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value $summary -Encoding utf8
