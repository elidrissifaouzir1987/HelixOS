    evidence_requirements:
      - id: atomic-two-index-claim
        requirement: A fresh binding atomically persists the composite nonce key, operation key, random attempt claim ID, exact binding digest and strictly increasing safe generation; exact repeat and either-key conflict remain closed denials after process reopen.
      - id: verified-storage-profile
        requirement: The reviewed application/schema identity and invariants open only with WAL, synchronous FULL, controlled checkpointing and caller-attested local-filesystem placement; foreign, newer, altered, corrupt or weaker stores fail closed.
      - id: contention
        requirement: At least 100 rounds with 64 synchronized threads and 20 rounds with 8 synchronized processes produce exactly one fresh durable winner per contested key and consistent rows/generation after reopen.
      - id: deadlines
        requirement: Controlled held-writer tests return by the boot-monotonic deadline plus declared scheduler tolerance, create no detached mutation and never return a positive claim after the deadline; no hard-cancellation claim is made for an in-flight VFS sync.
      - id: crash-and-ambiguity
        requirement: Every declared initialization, claim, checkpoint, backup and restore mutation/publication/profile boundary is process-killed or fault-injected; reopen is all-or-none, restored roots remain pending/nonclaimable, and a possible commit is never reported unavailable or retried without exact fresh-view proof. Evidence is labeled process-kill, not power-loss.
      - id: online-backup-clean-restore
        requirement: A live SQLite online backup publishes its verified manifest last, clean restore uses the SQLite API into an empty root, every included claim retains conflict behavior, and evidence requires paused activation plus new instance/fencing epochs while admitting later claims may be absent.
      - id: portable-corpus
        requirement: The same case IDs, expected outcomes, reviewed schema and manifest run unchanged on required Windows x64, Linux x64 and macOS arm64 hosts without target-OS-conditioned replay semantics.
      - id: redaction-and-removal
        requirement: Public errors, debug, metrics, fixtures and evidence expose no native path, nonce, operation/task/workload ID, binding/plan digest or provider diagnostic; no online prune or production fallback to the in-memory claimant exists.
      - id: benchmark
        requirement: Controlled local-SSD evidence records 500 warmups and at least 10000 acknowledged FULL/WAL commits with raw samples, p50/p95/p99/max, exact hardware/OS/architecture/filesystem assurance, toolchain, SQLite source/profile and corpus/schema digests; p95 is at most 25 ms and p99 at most 100 ms.
      - id: supply-chain
        requirement: Exact Rust/native dependency, bundled SQLite source/version, license, vulnerability, provenance, schema rollback-refusal and restore-drill evidence is retained for the immutable commit.
      - id: immutable-ci
        requirement: One unchanged Linux x64, macOS arm64 and Windows x64 matrix for the same commit publishes each exact runner image OS/version, OS/architecture and rustc host, bundled SQLite source ID/runtime profile, corpus/schema digests, upload-artifact digest, retained artifact and attestation URL before PLAN-003, portability or production readiness is claimed; the attestation binds the upload-artifact digest rather than an individual evidence file, a pull-request-only run is validation rather than immutable evidence, and hosted Mac evidence is not labeled Mac mini M4 power-loss proof.
