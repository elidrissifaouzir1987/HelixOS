    evidence_requirements:
      - id: PLAN-004-AUTHORITY
        requirement: Both complete captures, eligibility-built replay verification, exact comparison order and one caller-owned permit bounded by the earlier deadline or 250 ms deny every changed authority fact before the sole PREPARING linearization point.
      - id: PLAN-004-BUDGET
        requirement: Read-only preflight, checked exact arithmetic, create-only scopes, shared-scope contention and no-dispatch-guarded failure reconcile one permanent held reservation without oversubscription or double release.
      - id: PLAN-004-RECOVERY
        requirement: Manifest-last recovery publication, exact binding/capacity, authenticated L2 no-material evidence and both guarded retirement paths survive corruption, contention and process-crash tests without fabricating an operation.
      - id: PLAN-004-DURABILITY
        requirement: The bundled SQLite store owns the canonical atomic preparation set under strict schema, WAL/FULL profile, exact readback and a closed fault-boundary inventory; possible commit is never retried as definite absence.
      - id: PLAN-004-RESTORE
        requirement: A paused quiescent backup publishes complete inventory and detached signed provenance; clean empty-root restore leaves independently durable matching RESTORE_PENDING coordinator and recovery roots, rotated authority and zero activation path.
      - id: PLAN-004-DATA
        requirement: Source-classified plans and recovery bytes stay under approved at-rest custody, never enter agent/model, Graphify, egress or public diagnostics, and follow explicit no-pruning plus guarded-retirement retention.
      - id: PLAN-004-PORTABILITY
        requirement: One unchanged 335-case corpus, 123-boundary registry, package/restore KATs and reviewed SQL/JSON schema bytes reproduce on Linux x64, macOS arm64 and Windows x64 without a weaker identity fallback; Windows v1 additionally proves the fixed RESTORE_PLATFORM_UNSUPPORTED refusal before package capture because the available high-resolution identity API cannot bind a retained handle.
      - id: PLAN-004-PERFORMANCE
        requirement: Physical Mac mini M4 evidence retains 500 warmups and at least 10000 coordinator samples with p95 at most 25 ms and p99 at most 100 ms; recovery transfer is measured in a separate artifact and all waits remain deadline bounded.
      - id: PLAN-004-SUPPLY
        requirement: Exact lockfile, native SQLite source, licenses, advisories, SBOM/provenance expectations, immutable artifacts, rollback refusal, subsystem clean restore and removal evidence are retained before any PLAN-004 or Tier 1 claim.
