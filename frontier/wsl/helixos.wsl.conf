# /etc/wsl.conf pour la distro DÉDIÉE `helixos` (jamais la distro `Ubuntu` de l'utilisateur).
# Durcissement de la frontière runtime->hôte (réduction de surface, PAS frontière de VM —
# cf. décision-record : WSL2 durci = réduction de surface, le vrai rempart = noyau + HITL).
# Déployé par setup-distro.ps1.

[automount]
# Pas de montage automatique des disques Windows sous /mnt (ferme /mnt/c & co.).
enabled = false
mountFsTab = false

[interop]
# Bloque le lancement de binaires Windows (.exe) depuis Linux.
enabled = false
appendWindowsPath = false

[user]
# Session non-root par défaut (l'utilisateur applicatif, pas root).
default = helix

[boot]
# systemd pour piloter dockerd natif ; démarre docker au boot de la distro.
systemd = true
command = "service docker start || systemctl start docker"

[network]
# Pas de génération d'un /etc/hosts/resolv.conf qui exposerait des noms d'hôte Windows.
generateHosts = false
generateResolvConf = true
